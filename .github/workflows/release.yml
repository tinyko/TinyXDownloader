name: release

on:
  push:
    tags:
      - "V*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to publish
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: publish
    runs-on: [self-hosted, macOS, xdownloader-macos]
    env:
      CC: clang
      CXX: clang++
      MACOS_SIGN_IDENTITY: ${{ vars.MACOS_SIGN_IDENTITY }}
      MACOS_TEAM_ID: ${{ vars.MACOS_TEAM_ID }}
      MACOS_NOTARY_PROFILE: ${{ vars.MACOS_NOTARY_PROFILE }}
      MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
      MACOS_CERTIFICATE_PEM: ${{ secrets.MACOS_CERTIFICATE_PEM }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
      MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
      MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            echo "value=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag is required for workflow_dispatch" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.tag.outputs.value }}

      - name: Verify self-hosted toolchain
        shell: bash
        run: |
          source ./scripts/common.sh
          normalize_macos_toolchain
          require_command go
          require_command node
          require_command pnpm
          go version
          node --version
          pnpm --version

      - name: Verify release tag exists
        run: git rev-parse "${{ steps.tag.outputs.value }}"

      - name: Verify signing variables
        shell: bash
        run: |
          missing=0
          for name in MACOS_SIGN_IDENTITY MACOS_TEAM_ID MACOS_CERTIFICATE_P12 MACOS_CERTIFICATE_PEM MACOS_CERTIFICATE_PASSWORD MACOS_KEYCHAIN_PASSWORD MACOS_NOTARY_APPLE_ID MACOS_NOTARY_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required release signing variable: ${name}" >&2
              missing=1
            fi
          done
          [[ "$missing" -eq 0 ]] || exit 1

      - name: Install signing certificate
        shell: bash
        run: |
          certificate_path="$RUNNER_TEMP/developer-id-application.p12"
          certificate_pem_path="$RUNNER_TEMP/developer-id-application.pem"
          keychain_path="$RUNNER_TEMP/tinyxdownloader-signing.keychain-db"

          security delete-keychain "$keychain_path" >/dev/null 2>&1 || true
          if ! printf '%s' "$MACOS_CERTIFICATE_P12" | base64 --decode > "$certificate_path" 2>/dev/null; then
            printf '%s' "$MACOS_CERTIFICATE_P12" | base64 -D > "$certificate_path"
          fi

          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$keychain_path"
          printf '%s' "$MACOS_CERTIFICATE_PEM" > "$certificate_pem_path"
          security import "$certificate_pem_path" \
            -k "$keychain_path" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$MACOS_KEYCHAIN_PASSWORD" \
            "$keychain_path" >/dev/null
          security list-keychains -d user -s "$keychain_path" /Library/Keychains/System.keychain
          security default-keychain -s "$keychain_path"
          rm -f "$certificate_path" "$certificate_pem_path"

      - name: Verify signing configuration
        shell: bash
        run: |
          keychain_path="$RUNNER_TEMP/tinyxdownloader-signing.keychain-db"

          security find-identity -v -p codesigning | grep -F "$MACOS_SIGN_IDENTITY" >/dev/null || {
            echo "Developer ID signing identity was not found on this runner: ${MACOS_SIGN_IDENTITY}" >&2
            exit 1
          }

          xcrun notarytool history \
            --apple-id "$MACOS_NOTARY_APPLE_ID" \
            --password "$MACOS_NOTARY_PASSWORD" \
            --team-id "$MACOS_TEAM_ID" >/dev/null || {
            echo "Apple notarization credentials are not usable on this runner" >&2
            exit 1
          }

      - name: Prepare embedded assets
        shell: bash
        run: |
          source ./scripts/common.sh
          ensure_embed_inputs
          generate_wails_bindings

      - name: Run backend tests
        run: go test ./...

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Lint frontend
        run: pnpm --dir frontend lint

      - name: Run frontend unit tests
        run: pnpm --dir frontend test

      - name: Build frontend
        run: pnpm --dir frontend build

      - name: Install Playwright Chromium
        run: pnpm --dir frontend exec playwright install chromium

      - name: Run browser smoke
        run: pnpm --dir frontend test:e2e

      - name: Run desktop smoke
        run: ./scripts/desktop-smoke.sh

      - name: Build signed macOS release
        run: ./build-macos.sh

      - name: Extract release notes
        run: |
          tag="${{ steps.tag.outputs.value }}"
          notes_path="build/release/release-notes.md"
          mkdir -p "$(dirname "$notes_path")"
          awk -v tag="$tag" '
            $0 ~ "^## " tag {
              flag=1
              next
            }
            /^## / && flag {
              exit
            }
            flag {
              print
            }
          ' CHANGELOG.md > "$notes_path"
          [[ -s "$notes_path" ]] || {
            echo "Failed to extract release notes for $tag" >&2
            exit 1
          }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          body_path: build/release/release-notes.md
          overwrite_files: true
          files: |
            build/release/*.zip
            build/release/*.dmg
            build/release/SHA256SUMS.txt

      - name: Cleanup signing keychain
        if: always()
        shell: bash
        run: |
          keychain_path="$RUNNER_TEMP/tinyxdownloader-signing.keychain-db"
          security default-keychain -s "$HOME/Library/Keychains/login.keychain-db" >/dev/null 2>&1 || true
          security list-keychains -d user -s "$HOME/Library/Keychains/login.keychain-db" /Library/Keychains/System.keychain >/dev/null 2>&1 || true
          security delete-keychain "$keychain_path" >/dev/null 2>&1 || true
