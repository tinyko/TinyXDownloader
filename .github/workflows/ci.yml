name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  backend:
    name: backend
    runs-on: macos-latest
    env:
      CC: clang
      CXX: clang++
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - name: Prepare embedded assets
        shell: bash
        run: |
          source ./scripts/common.sh
          ensure_embed_inputs

      - name: Run backend tests
        run: go test ./...

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 25.9.0
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Generate Wails bindings
        shell: bash
        run: |
          source ./scripts/common.sh
          ensure_embed_inputs
          generate_wails_bindings

      - name: Install Playwright Chromium
        run: pnpm --dir frontend exec playwright install chromium

      - name: Lint frontend
        run: pnpm --dir frontend lint

      - name: Run frontend unit tests
        run: pnpm --dir frontend test

      - name: Build frontend
        run: pnpm --dir frontend build

      - name: Run frontend smoke tests
        run: pnpm --dir frontend test:e2e

  desktop-smoke:
    name: desktop-smoke
    runs-on: [self-hosted, macOS, xdownloader-macos]
    needs:
      - backend
      - frontend
    env:
      CC: clang
      CXX: clang++
      SMOKE_OUTPUT_DIR: build/desktop-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Verify self-hosted toolchain
        shell: bash
        run: |
          source ./scripts/common.sh
          normalize_macos_toolchain
          require_command go
          require_command node
          require_command pnpm
          go version
          node --version
          pnpm --version

      - name: Run desktop smoke
        run: ./scripts/desktop-smoke.sh

      - name: Upload desktop smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: desktop-smoke-artifacts
          path: build/desktop-smoke
          if-no-files-found: ignore
