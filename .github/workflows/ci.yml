name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  backend:
    name: backend
    runs-on: macos-latest
    env:
      CC: clang
      CXX: clang++
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - name: Prepare embedded assets
        shell: bash
        run: |
          source ./scripts/common.sh
          ensure_embed_inputs

      - name: Run backend tests
        run: go test ./...

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 25.9.0
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Generate Wails bindings
        shell: bash
        run: |
          source ./scripts/common.sh
          ensure_embed_inputs
          generate_wails_bindings

      - name: Install Playwright Chromium
        run: pnpm --dir frontend exec playwright install chromium

      - name: Lint frontend
        run: pnpm --dir frontend lint

      - name: Run frontend unit tests
        run: pnpm --dir frontend test

      - name: Build frontend
        run: pnpm --dir frontend build

      - name: Run frontend smoke tests
        run: pnpm --dir frontend test:e2e

  desktop-smoke:
    name: desktop-smoke
    runs-on: [self-hosted, macOS, xdownloader-macos]
    needs:
      - backend
      - frontend
    env:
      CC: clang
      CXX: clang++
      SMOKE_OUTPUT_DIR: build/desktop-smoke
    steps:
      - name: Checkout
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote remove origin >/dev/null 2>&1 || true
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fetched=0
          for attempt in 1 2 3 4 5; do
            if git fetch --force --no-tags --prune origin "$GITHUB_SHA"; then
              fetched=1
              break
            fi
            sleep $((attempt * 10))
          done
          if [[ "$fetched" -eq 1 ]]; then
            git checkout --force "$GITHUB_SHA"
            git clean -ffdx
          else
            archive_path="$RUNNER_TEMP/tinyxdownloader-source.tgz"
            find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            curl -fsSL \
              --retry 8 \
              --retry-all-errors \
              --connect-timeout 20 \
              --max-time 180 \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/tarball/$GITHUB_SHA" \
              -o "$archive_path"
            tar -xzf "$archive_path" -C "$GITHUB_WORKSPACE" --strip-components=1
          fi

      - name: Verify self-hosted toolchain
        shell: bash
        run: |
          source ./scripts/common.sh
          normalize_macos_toolchain
          require_command go
          require_command node
          require_command pnpm
          go version
          node --version
          pnpm --version

      - name: Run desktop smoke
        run: ./scripts/desktop-smoke.sh

      - name: Archive desktop smoke artifacts
        if: always()
        shell: bash
        run: |
          if [[ -d build/desktop-smoke ]]; then
            tar -czf build/desktop-smoke-artifacts.tgz -C build desktop-smoke
            ls -lh build/desktop-smoke-artifacts.tgz
          else
            echo "No desktop smoke artifacts were generated."
          fi
